name: corpus

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Tier 1 — compile-only gate.  Runs on every PR on GitHub-hosted Ubuntu
  # runners.  No GPU; no CUDA driver needed.  Asserts every fixture
  # compiles through compile_function without raising.
  # -------------------------------------------------------------------------
  compile-gate:
    name: compile-gate (142 fixtures, CPU-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: corpus compile check
        run: python scripts/corpus_compile_check.py

  # -------------------------------------------------------------------------
  # Tier 2 — full GPU execution gate.  Runs on the self-hosted
  # [self-hosted, gpu, sm_120] runner (RTX 5090, BigDaddy).  Runs on
  # every push to main, on PRs labeled `gpu-check`, and on manual
  # workflow_dispatch.  Does NOT block PRs from forks (self-hosted
  # runners on public repos gate fork-PR workflows automatically).
  # -------------------------------------------------------------------------
  corpus-gpu:
    name: corpus-gpu (full execution, RTX 5090 / SM_120)
    runs-on: [self-hosted, gpu, sm_120]
    needs: compile-gate
    if: >-
      ${{ github.event_name == 'push'
          || github.event_name == 'workflow_dispatch'
          || (github.event_name == 'pull_request'
              && contains(github.event.pull_request.labels.*.name, 'gpu-check')) }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: corpus execution sweep
        run: python scripts/corpus_sweep.py
