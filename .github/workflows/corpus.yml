name: corpus

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Tier 1 — compile-only gate.  Runs on every PR on GitHub-hosted Ubuntu
  # runners.  No GPU; no CUDA driver needed.  Asserts every fixture
  # compiles through compile_function without raising.
  # -------------------------------------------------------------------------
  compile-gate:
    name: compile-gate (142 fixtures, CPU-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: corpus compile check
        run: python scripts/corpus_compile_check.py

  # -------------------------------------------------------------------------
  # Tier 2 — full GPU execution gate.  DORMANT until a self-hosted runner
  # with the [self-hosted, gpu, sm_120] labels is actually registered.
  # Triggers only on manual workflow_dispatch so it never silently queues
  # on a missing runner and never spams maintainers with failure emails.
  # See docs/CI.md for runner setup.  Once a runner is registered, flip
  # the triggers below to match the compile-gate scope.
  # -------------------------------------------------------------------------
  corpus-gpu:
    name: corpus-gpu (full execution, RTX 5090 / SM_120)
    runs-on: [self-hosted, gpu, sm_120]
    if: ${{ github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: corpus execution sweep
        run: python scripts/corpus_sweep.py
